# =============================================================================
# ====== Default configuration parameters, for all modules ====================
# =============================================================================
[DEFAULT]

; # Default verbosity level
; verbose=True

; # Default high verbosity level
; veryverbose=False

# Number of CPU cores to use for parallelization. This number should not
# exceed the number of CPU cores on your machine (beyond that point, the
# extra "parallel" tasks queue up in serial fashion). 
# Set this value to zero (parallelcores=0) to skip parallelizing altogether.
# To learn the number of cores present on your own machine, issue in python:
#   import multiprocessing
#   multiprocessing.cpu_count()
# You may override parallelcores for specific tasks below (not recommended).
parallelcores=8

# The root directory for the BHC git repository
# By default, used to place the data and cache directories
# You may override any of these for specific tasks
rootdir=C:/Users/sumit/GitRepos/FloodResearch/bhccpx
; rootdir=/home/mf/Projects/mktcpx/coding/bhccpx

# The datadir is where the NIC ZIP, XML or CSV downloads are stored. 
# You may override this choice for specific tasks below (not recommended).
datadir=${DEFAULT:rootdir}/data
; datadir=/media/mf/MF_BAK/data/findata/nic

# The cachedir is the location for generated data artefacts (such as interim 
# *.pik files). You can empty the cachedir at any time and have it 
# created afresh. This will likely be a computationally costly operation.
# You may override this choice for specific tasks below (not recommended).
cachedir=${DEFAULT:rootdir}/data/cache
; cachedir=/media/mf/MF_BAK/data/findata/nic/cache

# This is the full path to the process log file
logfilepath=${DEFAULT:rootdir}/out/log/BHCCPX.log


# =============================================================================
# =================== Python logging configuration  ===========================
# =============================================================================
# https://docs.python.org/3/library/logging.config.html#logging-config-fileformat
# 
# An important configuration choice is the level of log messages to emit.
# There is a hierarchy for this. For whatever level you select, the log
# handler will emit messages of that level and higher.
# Available logging levels (to set on handlers) are, from low to high:
#   * NOTSET    Emit everything
#   * DEBUG     Very detailed information, useful for forensics
#   * INFO      Confirmation that things are working as expected
#   * WARNING   Unexpected behavior or incipient problem, but still running
#   * ERROR     Serious problem, some functionality is failing
#   * CRITICAL  Existential crisis, incipient software crash
#..............................................................................
[loggers]
keys=root

[logger_root]
# Leave this at NOTSET, apply levels to handlers
level=NOTSET      
# These handlers are configured below         
handlers=file,console

#..............................................................................
[handlers]
keys=console,file

[handler_console]
class=StreamHandler
level=INFO
formatter=simple
args=(sys.stdout,)

[handler_file]
class=FileHandler
level=DEBUG
formatter=standard
args=('${DEFAULT:logfilepath}', 'a')

#..............................................................................
[formatters]
keys=standard,simple

[formatter_standard]
format=%(asctime)s::%(levelname)s::%(name)s::%(lineno)d - %(message)s

[formatter_simple]
format=%(levelname)s::%(name)s::%(lineno)d - %(message)s


# =============================================================================
# ========= Configuration parameters for nic2csv.py ===========================
# =============================================================================
[nic2csv]

# The date suffix of the *.zip NIC snapshot to unzip.
# This parameter should be in YYYYMMDD format.
# All NIC files with the matching snapshot will be unzipped.
# If set to None (the default), then the most recent snapshot is used.
unpack_snapshot=None


